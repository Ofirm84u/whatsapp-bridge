<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 260px; padding: 16px; font-family: -apple-system, sans-serif; background: #111; color: #e5e5e5; }
    h1 { font-size: 14px; color: #25d366; margin-bottom: 12px; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .green { background: #4ade80; }
    .red { background: #f87171; }
    .label { font-size: 12px; color: #999; }
    .value { font-size: 12px; color: #e5e5e5; font-weight: 600; }
    a { color: #25d366; font-size: 12px; text-decoration: none; display: block; margin-top: 12px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>WhatsApp Bridge</h1>
  <div class="row">
    <span class="dot" id="relay-dot"></span>
    <span class="label">Relay Server:</span>
    <span class="value" id="relay-status">...</span>
  </div>
  <div class="row">
    <span class="dot" id="content-dot"></span>
    <span class="label">WhatsApp Web:</span>
    <span class="value" id="content-status">...</span>
  </div>
  <a href="http://localhost:8070/admin" target="_blank">Open Admin Panel</a>

  <script src="popup.js"></script>
</body>
</html>
